<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da Palma a Palma</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#e2c89d;
}

body{
    background-image:url("logo.png");
    background-repeat:no-repeat;
    background-position:center 40%;
    background-size:70%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

.container{
    width:90%;
    max-width:420px;
    margin-top:70px;
    text-align:center;
    z-index:2;
}

h1{
    font-size:28px;
    color:#111;
    margin-bottom:14px;
}

.email{
    font-size:18px;
    font-weight:bold;
    color:#1d4f2f;
    margin-bottom:14px;
}

.btn{
    display:block;
    width:100%;
    padding:13px;
    margin-bottom:16px;
    border-radius:8px;
    text-decoration:none;
    font-size:17px;
    font-weight:bold;
    color:#1d4f2f;
    background:rgba(255,255,255,.18);
    border:1px solid rgba(255,255,255,.5);
}

.whatsapp{
    display:inline-block;
    margin-top:10px;
    padding:14px 28px;
    border-radius:8px;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
}

@media (max-width:768px){

    body{
        background-size:85%;
        background-position:center 35%;
    }

    .container{
        margin-top:50px;
    }

    h1{
        font-size:24px;
    }

    .email{
        font-size:17px;
    }
}
</style>

</head>

<body>

<div class="container">

<h1>Manutenzione e<br>abbattimento palme</h1>

<div class="email">
info@dapalmaapalma.ch

</a>

<a class="btn" href="https://instagram.com/dapalmaapalma/" target="_blank">

</a>

</html>
