<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da Palma a Palma</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#e6cfab;
    overflow:hidden;
}

.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center center;
    z-index:-1;
}

.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:70px;
    text-align:center;
}

.content{
    width:90%;
    max-width:420px;
}

h1{
    font-size:42px;
    color:#111;
    margin-bottom:18px;
}

.email{
    color:#1d4f2f;
    font-weight:bold;
    font-size:24px;
    margin-bottom:18px;
}

.btn{
    display:block;
    width:100%;
    padding:14px;
    margin-bottom:16px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
    font-size:18px;
    color:#1d4f2f;
    background:rgba(255,255,255,.2);
    border:1px solid rgba(255,255,255,.45);
    backdrop-filter:blur(4px);
}

.whatsapp{
    display:inline-block;
    background:#25D366;
    color:#fff;
    padding:14px 28px;
    border-radius:10px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

@media (max-width:768px){

    .bg{
        object-fit:cover;
        object-position:center bottom;
        opacity:.95;
    }

    .container{
        padding-top:50px;
    }

    h1{
        font-size:28px;
    }

    .email{
        font-size:18px;
    }

    .btn{
        font-size:16px;
        padding:13px;
    }

    .whatsapp{
        font-size:18px;
    }
}
</style>

</head>

<body>

<img src="logo.png" class="bg" alt="Logo">

<div class="container">

<div class="content">

<h1>Manutenzione e abbattimento palme</h1>

<div class="email">info@dapalmaapalma.ch</div>

<a class="btn" href="mailto:info@dapalmaapalma.ch">
Scrivici via email
</a>

<a class="btn" href="https://instagram.com/dapalmaapalma/" target="_blank">
Instagram
</a>

<a class="whatsapp" href="https://wa.me/41765468541" target="_blank">
WhatsApp
</a>

</div>

</div>

</body>
</html>
